name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v4.0.0-talha.1). Leave empty for a dry run."
        required: false
        default: ""

jobs:
  build-wheel:
    name: Build wheel + sdist (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build distribution
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          retention-days: 14

  build-binary:
    name: Build standalone binary (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            spec: packaging/pyinstaller/specs/x-anylabeling-win-cpu.spec
            artifact_name: x-anylabeling-windows-cpu
          - os: ubuntu-latest
            spec: packaging/pyinstaller/specs/x-anylabeling-linux-cpu.spec
            artifact_name: x-anylabeling-linux-cpu
          - os: macos-latest
            spec: packaging/pyinstaller/specs/x-anylabeling-macos.spec
            artifact_name: x-anylabeling-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project with CPU extras
        run: |
          python -m pip install --upgrade pip
          pip install ".[cpu]"
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm ${{ matrix.spec }}
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [build-wheel, build-binary]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Flatten wheels + sdist
          find artifacts/python-dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          # Zip each binary folder
          for dir in artifacts/x-anylabeling-*/; do
            name=$(basename "$dir")
            (cd "$dir" && zip -r "../../release-assets/${name}.zip" .)
          done
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
